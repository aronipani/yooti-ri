[tool.pytest.ini_options]
testpaths = ["agents"]
asyncio_mode = "auto"
markers = [
    "eval: marks tests as LLM eval tests (deselect with '-m not eval')",
]
addopts = "--cov=agents --cov-report=json -v"

[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "W", "F", "I", "N", "UP", "B", "ANN"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
