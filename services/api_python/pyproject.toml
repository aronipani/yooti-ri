[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=src --cov-report=term-missing --cov-report=json -v"
markers = [
    "unit: unit tests — no external services",
    "integration: tests requiring real services",
    "eval: LLM eval tests — nightly only",
]

[tool.coverage.run]
omit = [
    "tests/*",
    # __init__ files — no logic
    "src/__init__.py",
    "src/models/__init__.py",
    "src/routes/__init__.py",
    "src/repositories/__init__.py",
    "src/services/__init__.py",
    "src/middleware/__init__.py",
    "src/types/__init__.py",
    # Config and DB session — infrastructure
    "src/config.py",
    "src/database.py",
    # Integration-test-only layers (require real DB / HTTP context)
    "src/repositories/*",
    "src/routes/*",
    "src/middleware/auth.py",
    # Scaffolding
    "alembic/*",
    "scripts/*",
    "seed_*.py",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
omit = [
    "tests/*",
    "src/__init__.py",
    "src/models/__init__.py",
    "src/routes/__init__.py",
    "src/repositories/__init__.py",
    "src/services/__init__.py",
    "src/middleware/__init__.py",
    "src/types/__init__.py",
    "src/config.py",
    "src/database.py",
    "src/repositories/*",
    "src/routes/*",
    "src/middleware/auth.py",
    "alembic/*",
    "scripts/*",
    "seed_*.py",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "ANN"]
ignore = ["ANN101", "ANN102", "B008"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
